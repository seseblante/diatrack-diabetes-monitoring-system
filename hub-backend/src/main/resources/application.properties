#
# UNCOMMENT THIS PART WHEN PUSHING TO MAIN
# ===============================
# Application
# ===============================
spring.application.name=hub-backend

# ===============================
# Server (REQUIRED FOR RENDER)
# ===============================
server.port=${PORT:8080}

# ===============================
# Database (HARDCODED, JDBC FORMAT)
# ===============================
spring.datasource.url=jdbc:postgresql://REDACTED_DB_HOST:5432/REDACTED_DB_NAME
spring.datasource.username=REDACTED_DB_USERNAME
spring.datasource.password=REDACTED_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ===============================
# Security (HARDCODED; Make sure to change this to an ENV variable)
# ===============================
application.security.jwt.secret-key=REDACTED_JWT_SECRET

spring.security.user.name=admin
spring.security.user.password=REDACTED_ADMIN_PASSWORD

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=http://localhost:5173
